# Server Configuration
server.port=${PORT:8084}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_IP:localhost}:${DB_PORT:5435}/monitoring_db
spring.datasource.username=${DB_USER:vutzu}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Replica Configuration
replica.id=${REPLICA_ID:1}

# Logging
logging.level.root=INFO
logging.level.com.example.monitoring=DEBUG
logging.level.org.springframework.amqp=DEBUG

# Application Name
spring.application.name=Monitoring Service


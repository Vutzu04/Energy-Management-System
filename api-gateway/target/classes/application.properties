spring.application.name=api-gateway

###############################################
### SERVER CONFIGURATION ###
###############################################
server.port=${PORT:8080}

###############################################
### JWT CONFIGURATION ###
###############################################
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong}

###############################################
### MICROSERVICES URLS ###
###############################################
authorization.service.url=${AUTHORIZATION_SERVICE_URL:http://localhost:8081}
user.management.service.url=${USER_MANAGEMENT_SERVICE_URL:http://localhost:8082}
device.management.service.url=${DEVICE_MANAGEMENT_SERVICE_URL:http://localhost:8083}
monitoring.service.url=${MONITORING_SERVICE_URL:http://localhost:8084}

###############################################
### LOGGING CONFIGURATIONS ###
###############################################
logging.level.root=warn
logging.level.org.springframework=warn
logging.level.com.example=info

###############################################
### SWAGGER/OPENAPI CONFIGURATIONS ###
###############################################
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false
springdoc.swagger-ui.disable-swagger-default-url=false
springdoc.swagger-ui.tag-sorter=alpha
springdoc.swagger-ui.operations-sorter=method


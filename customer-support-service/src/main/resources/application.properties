# Spring Boot Configuration
spring.application.name=customer-support-service
server.port=8086

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/support_db}
spring.datasource.username=${DB_USER:support_user}
spring.datasource.password=${DB_PASSWORD:support_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Logging
logging.level.root=INFO
logging.level.com.example.customersupport=DEBUG

